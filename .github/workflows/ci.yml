name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: grandline
          POSTGRES_PASSWORD: grandline
          POSTGRES_DB: grandline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U grandline"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports

      - name: Test (pytest)
        env:
          GRANDLINE_DATABASE_URL: postgresql+psycopg://grandline:grandline@localhost:5432/grandline_test
          GRANDLINE_REDIS_URL: redis://localhost:6379/0
        run: pytest -v

  frontend:
    name: Frontend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (eslint)
        run: npm run lint

      - name: Type check (tsc)
        run: npm run typecheck

      - name: Test (vitest)
        run: npm run test
