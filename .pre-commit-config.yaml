repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd src/backend && ./venv/bin/python -m mypy app/ --ignore-missing-imports'
        language: system
        files: ^src/backend/app/.*\.py$
        pass_filenames: false

      - id: eslint
        name: eslint
        entry: bash -c 'cd src/frontend && npx next lint --quiet'
        language: system
        files: ^src/frontend/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

      - id: tsc
        name: tsc
        entry: bash -c 'cd src/frontend && npx tsc --noEmit'
        language: system
        files: ^src/frontend/.*\.(ts|tsx)$
        pass_filenames: false
